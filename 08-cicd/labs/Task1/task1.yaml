name: Build and Push Docker Image

# Trigger the workflow on pushes to the "main" branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Check out the code
      uses: actions/checkout@v4

    # 2. Set up QEMU for multi-platform support (optional but recommended)
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    # 3. Set up Docker Buildx (enables advanced build capabilities)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. Log in to Docker Hub using the secrets configured earlier
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. Build the Docker image and push it to Docker Hub
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cicd:latest                # username/repo-name
          ${{ secrets.DOCKERHUB_USERNAME }}/cicd:${{ github.sha }}